name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Kover intermittently under-counts a module's coverage when the coverage-producing
      # test tasks run under Gradle's parallel executor (org.gradle.parallel=true in
      # gradle.properties): a module can report well below its real, isolated coverage,
      # failing koverVerify. The build runs parallel (fast) with coverage excluded, then
      # the coverage gate runs on its own, serially and from scratch, so the measurement
      # can never be a parallel-produced or cache-restored figure. --rerun-tasks is what
      # makes it authoritative: it re-executes the tests serially rather than trusting a
      # cached .ic that may have been written under parallel. Do not fold these back into
      # one command, and do not drop --no-parallel or --rerun-tasks from the coverage step.
      - name: Lint, test, and build
        run: ./gradlew check test assembleDebug -x koverVerify -x koverCachedVerify

      - name: Verify coverage floors
        run: ./gradlew koverVerify --no-parallel --rerun-tasks

      # The FFmpeg audio decoder is the only native code in the app. Google Play
      # requires 16 KB aligned .so files for apps targeting Android 15+, so fail the
      # build if a dependency bump ever regresses alignment.
      - name: Verify 16 KB native library alignment
        run: scripts/check-so-alignment.sh
