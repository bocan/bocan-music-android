name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Kover intermittently under-counts a module's coverage when the coverage-producing
      # test tasks run under Gradle's parallel executor (org.gradle.parallel=true in
      # gradle.properties): a module can report well below its real, isolated coverage,
      # failing koverVerify. The build runs parallel (fast) with coverage excluded, then
      # the coverage gate runs on its own, serially and from scratch, so the measurement
      # can never be a parallel-produced or cache-restored figure. --rerun-tasks is what
      # makes it authoritative: it re-executes the tests serially rather than trusting a
      # cached .ic that may have been written under parallel. Do not fold these back into
      # one command, and do not drop --no-parallel or --rerun-tasks from the coverage step.
      - name: Lint, test, and build
        run: ./gradlew check test assembleDebug -x koverVerify -x koverCachedVerify

      # The versionCode derivation lives in buildSrc and never decreases across a Play
      # upload, so its formula is unit tested and enforced on every push.
      - name: Verify versionCode derivation
        run: ./gradlew -p buildSrc test

      # R8 breaks are runtime breaks, not compile errors. Assembling the minified release
      # on every PR catches a missing keep rule the day the offending change lands rather
      # than on release day. The build is left unsigned (no keystore secret is read here).
      - name: Assemble release (unsigned, catches R8 breaks)
        run: ./gradlew :app:assembleRelease

      - name: Verify 16 KB native library alignment (release APK)
        run: scripts/check-so-alignment.sh "$(find app/build/outputs/apk/release -name '*.apk' | head -1)"

      - name: Verify coverage floors
        run: ./gradlew koverVerify --no-parallel --rerun-tasks
