name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Lint, test, coverage, and build
        run: ./gradlew check test koverVerify assembleDebug

      # The FFmpeg audio decoder is the only native code in the app. Google Play
      # requires 16 KB aligned .so files for apps targeting Android 15+, so fail the
      # build if a dependency bump ever regresses alignment.
      - name: Verify 16 KB native library alignment
        run: scripts/check-so-alignment.sh
