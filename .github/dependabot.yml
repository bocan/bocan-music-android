version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Kotlin and KSP version in lockstep, and the compiler plugins must
      # match the Kotlin that AGP's built-in Kotlin support embeds. Bundle
      # them so one PR carries the whole toolchain bump.
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "com.google.devtools.ksp*"
      # Room rides on the androidx.sqlite driver APIs; bump them together.
      room:
        patterns:
          - "androidx.room3*"
          - "androidx.sqlite*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
